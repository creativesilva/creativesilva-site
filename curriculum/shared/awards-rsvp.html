<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP: Spring Awards Pizza Party</title>
  <link rel="icon" type="image/svg+xml" href="/logos/CS_Logo_Only.svg" />
  <link rel="apple-touch-icon" href="/logos/CS_Logo_Only.svg" />
  <meta name="robots" content="noindex" />
  <style>
    :root { --course-accent: #007474; }
    body { background:#0a0a0a; }
    input, select, button { font-family: Arial, sans-serif; }
    input:focus, select:focus { outline: 2px solid #00b8b8; outline-offset: 1px; }
  </style>
  <link rel="stylesheet" href="/css/silva-module.css" />
</head>
<body>

  <nav class="silva-nav" aria-label="RSVP navigation">
    <div class="silva-nav-inner">
      <div class="silva-breadcrumb">
        <a href="/curriculum.html">Curriculum</a>
        <span class="bc-sep">&rsaquo;</span>
        <a href="/curriculum/shared/awards-pizza-party.html" class="bc-hide-sm">Spring Awards</a>
        <span class="bc-sep bc-hide-sm">&rsaquo;</span>
        <span class="bc-current">RSVP</span>
      </div>

      <div class="silva-nav-spacer"></div>

      <a href="/curriculum/shared/awards-pizza-party.html" class="silva-step-btn">&#8592; Back to Announcement</a>
    </div>
  </nav>

  <div class="silva-page">
  <div id="silva-module-content">

  <div id="top" style="width:100%;max-width:680px;margin:0 auto;font-family:Arial,sans-serif;color:#ffffff;background:#080808;border-radius:30px;overflow:hidden;">

    <div style="padding:28px 28px 40px;">

      <!-- Banner -->
      <div style="background:linear-gradient(135deg,#000000 0%,#003838 40%,#007474 100%);padding:24px 28px 26px;margin:-28px -28px 24px -28px;text-align:center;">
        <div style="margin-bottom:6px;"><span style="font-size:12pt;color:#80e0e0;letter-spacing:0.14em;text-transform:uppercase;"><strong>Spring Awards Pizza Party</strong></span></div>
        <div style="color:#ffffff;font-size:26pt;font-weight:700;line-height:1.1;"><strong>RSVP</strong></div>
      </div>

      <!-- Quick event details -->
      <div style="background:rgba(0,0,0,0.32);border:1px solid rgba(0,184,184,0.22);border-radius:18px;padding:18px 22px;margin-bottom:22px;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 18px;font-size:13pt;line-height:1.5;color:rgba(255,255,255,0.92);">
          <div><strong style="color:#80e0e0;">When:</strong><br />Tue, Jun 2 2026<br />12:25 &ndash; 1:05 PM</div>
          <div><strong style="color:#80e0e0;">Where:</strong><br />Room 322<br />Mr. Silva&rsquo;s Room</div>
          <div><strong style="color:#80e0e0;">Guests:</strong><br />Invite only<br />Plus-one max</div>
        </div>
      </div>

      <!-- Form -->
      <form id="rsvp-form" onsubmit="return rsvpSubmit(event)" style="display:grid;gap:14px;">

        <div>
          <label style="display:block;font-size:11pt;letter-spacing:0.10em;text-transform:uppercase;color:#80e0e0;margin-bottom:6px;"><strong>Full Name <span style="color:#ffb27c;">*</span></strong></label>
          <input type="text" name="full_name" required placeholder="First and last name" style="width:100%;background:rgba(0,0,0,0.40);border:1px solid rgba(0,184,184,0.30);border-radius:12px;padding:12px 14px;color:#ffffff;font-size:14pt;box-sizing:border-box;" />
        </div>

        <div>
          <label style="display:block;font-size:11pt;letter-spacing:0.10em;text-transform:uppercase;color:#80e0e0;margin-bottom:6px;"><strong>Student ID Number <span style="color:#ffb27c;">*</span></strong></label>
          <input type="text" name="student_id" required inputmode="numeric" pattern="[0-9]{4,10}" placeholder="Digits only" style="width:100%;background:rgba(0,0,0,0.40);border:1px solid rgba(0,184,184,0.30);border-radius:12px;padding:12px 14px;color:#ffffff;font-size:14pt;box-sizing:border-box;" />
          <div style="margin-top:6px;font-size:11pt;color:rgba(255,255,255,0.55);">Used to match your RSVP to the invite list.</div>
        </div>

        <div>
          <label style="display:block;font-size:11pt;letter-spacing:0.10em;text-transform:uppercase;color:#80e0e0;margin-bottom:6px;"><strong>Bringing a Guest? <span style="color:#ffb27c;">*</span></strong></label>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">
            <label style="background:rgba(0,0,0,0.40);border:1px solid rgba(0,184,184,0.30);border-radius:12px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14pt;color:#ffffff;">
              <input type="radio" name="bringing_guest" value="No" required onchange="rsvpToggleGuest(false)" style="margin:0;" />
              <span>No, just me</span>
            </label>
            <label style="background:rgba(0,0,0,0.40);border:1px solid rgba(0,184,184,0.30);border-radius:12px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14pt;color:#ffffff;">
              <input type="radio" name="bringing_guest" value="Yes" required onchange="rsvpToggleGuest(true)" style="margin:0;" />
              <span>Yes, +1 guest</span>
            </label>
          </div>
        </div>

        <div id="rsvp-guest-field" style="display:none;">
          <label style="display:block;font-size:11pt;letter-spacing:0.10em;text-transform:uppercase;color:#80e0e0;margin-bottom:6px;"><strong>Guest&rsquo;s Full Name</strong></label>
          <input type="text" name="guest_name" placeholder="Your guest&rsquo;s first and last name" style="width:100%;background:rgba(0,0,0,0.40);border:1px solid rgba(0,184,184,0.30);border-radius:12px;padding:12px 14px;color:#ffffff;font-size:14pt;box-sizing:border-box;" />
        </div>

        <div style="margin-top:6px;">
          <button type="submit" id="rsvp-submit" style="width:100%;background:#FF6B1A;color:#ffffff;border:0;padding:16px 28px;border-radius:999px;font-size:15pt;cursor:pointer;"><strong>&#10004; Send My RSVP</strong></button>
        </div>

        <div id="rsvp-status" style="font-size:13pt;color:#80e0e0;line-height:1.5;min-height:1.5em;"></div>

      </form>

      <div style="margin-top:20px;text-align:center;font-size:11pt;color:rgba(255,255,255,0.55);">
        Questions? Email <a href="mailto:chris@creativesilva.com" style="color:#80e0e0;">chris@creativesilva.com</a>
      </div>

    </div>

  </div>
  </div>
  </div>

  <!-- EmailJS SDK + RSVP submission handler -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    if (window.emailjs) { emailjs.init({ publicKey: '68UkiTjqHIKZMkeCC' }); }

    function rsvpToggleGuest(show) {
      var f = document.getElementById('rsvp-guest-field');
      if (f) f.style.display = show ? 'block' : 'none';
    }

    function rsvpSubmit(e) {
      e.preventDefault();
      var form = document.getElementById('rsvp-form');
      var btn = document.getElementById('rsvp-submit');
      var status = document.getElementById('rsvp-status');
      if (!form || !btn || !status) return false;

      var name = (form.full_name.value || '').trim();
      var studentId = (form.student_id.value || '').trim();
      var guest = form.bringing_guest.value;
      var guestName = (form.guest_name && form.guest_name.value || '').trim();

      btn.disabled = true;
      btn.style.opacity = '0.6';
      btn.innerHTML = '<strong>Sending&hellip;</strong>';
      status.style.color = '#80e0e0';
      status.textContent = '';

      var message =
        'RSVP - Spring Awards Pizza Party\n' +
        'Event: Tue, Jun 2 2026, 12:25-1:05 PM, Room 322\n\n' +
        'Student Name: ' + name + '\n' +
        'Student ID: ' + studentId + '\n' +
        'Bringing Guest: ' + guest + '\n' +
        'Guest Name: ' + (guestName || 'N/A') + '\n' +
        'Headcount: ' + (guest === 'Yes' ? '2' : '1');

      if (!window.emailjs) {
        status.style.color = '#ffb27c';
        status.textContent = 'Service unavailable. Please email chris@creativesilva.com';
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.innerHTML = '<strong>&#10004; Send My RSVP</strong>';
        return false;
      }

      emailjs.send('service_4mhkbik', 'template_creativesilva', {
        name: name + ' (RSVP)',
        email: studentId + '@rsvp.awards',
        message: message
      }).then(function() {
        status.style.color = '#7fe88a';
        status.innerHTML = '&#10003; <strong>RSVP received.</strong> See you Tue Jun 2 at 12:25 in Room 322.';
        btn.innerHTML = '<strong>RSVP Sent</strong>';
        btn.style.background = '#00b8b8';
        var inputs = form.querySelectorAll('input, select, button');
        for (var i = 0; i < inputs.length; i++) inputs[i].disabled = true;
      }, function(err) {
        status.style.color = '#ffb27c';
        status.textContent = 'Could not send RSVP. '
          + (err && err.text ? '(' + err.text + ')' : '')
          + ' Email chris@creativesilva.com';
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.innerHTML = '<strong>&#10004; Send My RSVP</strong>';
      });

      return false;
    }
  </script>
</body>
</html>
